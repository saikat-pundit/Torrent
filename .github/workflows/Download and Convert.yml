name: Download and Convert to H.265

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: '480p'
        options:
          - '240p'
          - '480p'
          - '720p'
      zip_name:
        description: 'Zip file name (without extension)'
        required: false
        type: string
        default: 'converted_videos'
      upload_to:
        description: 'Upload destination'
        required: true
        type: choice
        default: 'artifacts'
        options:
          - 'artifacts'
          - 'release'

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run torrent download and conversion
        env:
          MAGNET_LINK: ${{ inputs.magnet_link }}
          QUALITY: ${{ inputs.quality }}
          ZIP_NAME: ${{ inputs.zip_name }}
          UPLOAD_TO: ${{ inputs.upload_to }}
        run: python scripts/torrent_download_convert.py
      
      - name: Upload to Artifacts
        if: ${{ inputs.upload_to == 'artifacts' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.zip_name }}
          path: |
            ./download/*.mkv
            ./download/*.srt
            ./download/*.ass
            ./download/*.ssa
            ./download/*.sub
          if-no-files-found: warn
      
      - name: Create Release Tag
        if: ${{ inputs.upload_to == 'release' }}
        id: create_tag
        run: |
          TAG_NAME="release-$(date +'%Y%m%d-%H%M%S')"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
      
      - name: Upload to Release
        if: ${{ inputs.upload_to == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.create_tag.outputs.tag_name }}
          name: ${{ inputs.zip_name }} - ${{ inputs.quality }}
          files: |
            ./download/*.mkv
            ./download/*.srt
            ./download/*.ass
            ./download/*.ssa
            ./download/*.sub
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
