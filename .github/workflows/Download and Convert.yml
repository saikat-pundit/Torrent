name: Download and Convert to H.265

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: '480p'
        options:
          - '240p'
          - '480p'
          - '720p'
      zip_name:
        description: 'Zip file name (without extension)'
        required: false
        type: string
        default: 'converted_videos'
      upload_to:
        description: 'Upload destination'
        required: true
        type: choice
        default: 'artifacts'
        options:
          - 'artifacts'
          - 'release'

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run torrent download and conversion
        env:
          MAGNET_LINK: ${{ inputs.magnet_link }}
          QUALITY: ${{ inputs.quality }}
          ZIP_NAME: ${{ inputs.zip_name }}
          UPLOAD_TO: ${{ inputs.upload_to }}
        run: python scripts/torrent_download_convert.py
      
      - name: Upload to Artifacts
        if: ${{ inputs.upload_to == 'artifacts' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.zip_name }}
          path: ${{ inputs.zip_name }}.zip
          if-no-files-found: error
      
      - name: Create Release
        if: ${{ inputs.upload_to == 'release' }}
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }} - ${{ inputs.zip_name }}
          draft: false
          prerelease: false
      
      - name: Upload to Movie1 Release
        if: ${{ inputs.upload_to == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Movie1
          files: ${{ inputs.zip_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
