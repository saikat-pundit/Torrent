name: Download and Convert to 480p x265

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      output_name:
        description: 'Output filename (without extension, e.g., myvideo)'
        required: false
        type: string
        default: 'converted_video'

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 ffmpeg
          ffmpeg -version

      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"

      - name: Find and convert video files
        run: |
          cd ./download
          
          echo "Contents of download directory:"
          ls -la
          
          # Find all video files (common formats) - handles spaces in filenames
          find . -maxdepth 1 -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.mov" -o -iname "*.flv" -o -iname "*.webm" -o -iname "*.wmv" -o -iname "*.m4v" \) -print0 2>/dev/null | while IFS= read -r -d '' INPUT_VIDEO; do
            # Skip if no video found
            if [[ -z "$INPUT_VIDEO" ]]; then
              echo "No video files found in download directory"
              exit 1
            fi
            
            # Get filename without path
            BASENAME=$(basename "$INPUT_VIDEO")
            FILENAME_WO_EXT="${BASENAME%.*}"
            
            # Generate safe output filename
            SAFE_NAME=$(echo "${{ inputs.output_name }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # Determine output filename
            if [[ -z "$OUTPUT_COUNTER" ]]; then
              OUTPUT_FILE="${SAFE_NAME}.mkv"
              OUTPUT_COUNTER=1
            else
              OUTPUT_FILE="${SAFE_NAME}_part${OUTPUT_COUNTER}.mkv"
              OUTPUT_COUNTER=$((OUTPUT_COUNTER + 1))
            fi
            
            echo "========================================="
            echo "Converting: $BASENAME"
            echo "Output: $OUTPUT_FILE"
            echo "Resolution: 720x304 (480p), Codec: libx265"
            echo "========================================="
            
            # Convert to 480p x265 with all audio/subtitle streams retained
            ffmpeg -i "$INPUT_VIDEO" \
              -c:v libx265 \
              -vf "scale=720:304:force_original_aspect_ratio=decrease,pad=720:304:(ow-iw)/2:(oh-ih)/2" \
              -preset medium \
              -crf 28 \
              -c:a copy \
              -c:s copy \
              -map 0 \
              "$OUTPUT_FILE"
            
            # Check if conversion succeeded
            if [[ $? -eq 0 ]]; then
              echo "✅ Successfully converted: $OUTPUT_FILE"
              # Remove original video file to save space
              rm -f "$INPUT_VIDEO"
              echo "🗑️  Removed original file: $BASENAME"
            else
              echo "❌ Failed to convert: $BASENAME"
              exit 1
            fi
            
            echo ""
          done
          
          # Verify conversion was done
          if [[ -z "$OUTPUT_COUNTER" ]]; then
            echo "No video files found to convert!"
            exit 1
          fi
          
          echo "========================================="
          echo "✅ Conversion complete!"
          echo "Final files in directory:"
          ls -la
          echo "========================================="

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name || 'converted-files' }}
          path: |
            ./download/*
