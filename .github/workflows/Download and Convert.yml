name: Download and Convert to H.265

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: '480p'
        options:
          - '240p'
          - '480p'
          - '720p'
      zip_name:
        description: 'Zip file name (without extension)'
        required: false
        type: string
        default: 'converted_videos'
      upload_to:
        description: 'Upload destination'
        required: true
        type: choice
        default: 'artifacts'
        options:
          - 'artifacts'
          - 'release'

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run torrent download and conversion
        env:
          MAGNET_LINK: ${{ inputs.magnet_link }}
          QUALITY: ${{ inputs.quality }}
          ZIP_NAME: ${{ inputs.zip_name }}
          UPLOAD_TO: ${{ inputs.upload_to }}
        run: python scripts/torrent_download_convert.py
      
      - name: Upload to Artifacts
        if: ${{ inputs.upload_to == 'artifacts' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.zip_name }}
          path: ${{ inputs.zip_name }}.zip
          if-no-files-found: error
      
      - name: Create or Update Movie1 Release
        if: ${{ inputs.upload_to == 'release' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if Movie1 release exists
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/Movie1" | jq -r '.id')
          
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            # Create new release with Movie1 tag
            echo "Creating new Movie1 release..."
            RELEASE_RESPONSE=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"Movie1\",\"name\":\"Movie1 - ${{ inputs.zip_name }}\",\"draft\":false,\"prerelease\":false}" \
              "https://api.github.com/repos/${{ github.repository }}/releases")
            
            RELEASE_ID=$(echo $RELEASE_RESPONSE | jq -r '.id')
            echo "Created release ID: $RELEASE_ID"
          else
            echo "Movie1 release already exists (ID: $RELEASE_ID)"
            
            # Delete old assets
            ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets")
            
            echo "$ASSETS" | jq -r '.[].id' | while read ASSET_ID; do
              if [ -n "$ASSET_ID" ] && [ "$ASSET_ID" != "null" ]; then
                echo "Deleting old asset ID: $ASSET_ID"
                curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/${{ github.repository }}/releases/assets/$ASSET_ID"
              fi
            done
          fi
          
          # Upload new zip file
          echo "Uploading ${{ inputs.zip_name }}.zip..."
          UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=${{ inputs.zip_name }}.zip"
          
          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @"${{ inputs.zip_name }}.zip" \
            "$UPLOAD_URL"
          
          echo "Upload complete!"
