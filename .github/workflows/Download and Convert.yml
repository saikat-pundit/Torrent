name: Download and Convert to H.265

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: '480p'
        options:
          - '480p'
          - '720p'
      zip_name:
        description: 'Zip file name (letters, numbers, dots, underscores, hyphens only)'
        required: false
        type: string
        default: 'converted_videos'

permissions:
  contents: write

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 ffmpeg python3
          pip install --user ffmpeg-python
          
      - name: Run converter
        run: |
          python3 converter.py "${{ inputs.magnet_link }}" "${{ inputs.quality }}"
          
      - name: Sanitize artifact name
        id: sanitize
        run: |
          SAFE_NAME=$(echo "${{ inputs.zip_name }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.safe_name }}
          path: |
            ./download/*.mkv
            ./download/*.srt
            ./download/*.ass
            ./download/*.ssa
            ./download/*.sub
          if-no-files-found: warn
