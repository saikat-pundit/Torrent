name: Download and Convert to H.265 (Parallel)

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: '480p'
        options:
          - '480p'
          - '720p'
      output_name:
        description: 'Output filename (without extension)'
        required: false
        type: string
        default: 'converted_video'

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 ffmpeg
          
      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"
                 
      - name: Find and convert video files with parallel encoding
        run: |
          cd ./download
          
          if [ "${{ inputs.quality }}" = "480p" ]; then
            SCALE_FILTER="scale=720:-2"
            CRF_VALUE="23"
          else
            SCALE_FILTER="scale=1280:-2"
            CRF_VALUE="21"
          fi
          
          find . -mindepth 2 -type f -exec mv {} . \; 2>/dev/null
          find . -type d -empty -delete 2>/dev/null
          
          find . -maxdepth 1 -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.mov" -o -iname "*.flv" -o -iname "*.webm" -o -iname "*.wmv" -o -iname "*.m4v" \) -print0 > /tmp/videos.list
          
          VIDEO_COUNT=$(find . -maxdepth 1 -type f \( -iname "*.mp4" -o -iname "*.mkv" -o -iname "*.avi" -o -iname "*.mov" -o -iname "*.flv" -o -iname "*.webm" -o -iname "*.wmv" -o -iname "*.m4v" \) | wc -l)
          
          if [ $VIDEO_COUNT -eq 0 ]; then
            echo "No video files found"
            exit 1
          fi
          
          while IFS= read -r -d '' INPUT_VIDEO; do
            BASENAME=$(basename "$INPUT_VIDEO")
            SAFE_NAME=$(echo "${{ inputs.output_name }}" | sed 's/[:\/\\?*<>|"'\'']/_/g')
            OUTPUT_FILE="${SAFE_NAME}.mkv"
            
            echo "Converting: $BASENAME using parallel encoding"
            
            # Get video duration in seconds
            DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$INPUT_VIDEO" | awk '{print int($1)}')
            SEGMENT_DURATION=$((DURATION / 4))
            
            echo "Total duration: ${DURATION}s, Segment duration: ${SEGMENT_DURATION}s"
            
            # Create segments directory
            mkdir -p segments
            
            # Split video into 4 segments
            echo "Splitting video into 4 segments..."
            ffmpeg -i "$INPUT_VIDEO" -c copy -map 0 -segment_time $SEGMENT_DURATION -f segment -segment_list segments/segments.txt segments/segment_%03d.mkv
            
            # Encode segments in parallel
            echo "Starting parallel encoding of 4 segments..."
            for i in 0 1 2 3; do
              (
                SEGMENT_FILE="segments/segment_$(printf "%03d" $i).mkv"
                OUTPUT_SEGMENT="segments/encoded_$(printf "%03d" $i).mkv"
                
                if [ -f "$SEGMENT_FILE" ]; then
                  echo "Encoding segment $i..."
                  ffmpeg -i "$SEGMENT_FILE" \
                    -c:v libx265 \
                    -vf "$SCALE_FILTER" \
                    -preset slow \
                    -crf $CRF_VALUE \
                    -c:a copy \
                    -c:s copy \
                    -map 0 \
                    "$OUTPUT_SEGMENT"
                fi
              ) &
            done
            
            # Wait for all encoding jobs to complete
            wait
            echo "All segments encoded"
            
            # Create concat file list
            echo "Merging segments..."
            > segments/concat.txt
            for i in 0 1 2 3; do
              ENCODED_SEGMENT="segments/encoded_$(printf "%03d" $i).mkv"
              if [ -f "$ENCODED_SEGMENT" ]; then
                echo "file '$ENCODED_SEGMENT'" >> segments/concat.txt
              fi
            done
            
            # Concatenate all segments
            ffmpeg -f concat -safe 0 -i segments/concat.txt -c copy "$OUTPUT_FILE"
            
            # Verify output
            if [ $? -eq 0 ] && [ -s "$OUTPUT_FILE" ]; then
              echo "Successfully converted: $OUTPUT_FILE"
              rm -f "$INPUT_VIDEO"
              rm -rf segments
            else
              echo "Failed to convert: $BASENAME"
              exit 1
            fi
            
          done < /tmp/videos.list
          
          rm -f /tmp/videos.list
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name }}-${{ inputs.quality }}
          path: |
            ./download/*
