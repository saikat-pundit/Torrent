name: Torrent Video Download and Convert to H.265/AV1

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: '480p'
        options:
          - '240p'
          - '480p'
          - '720p'
          - '480p-av1'
          - '720p-av1'
      zip_name:
        description: 'Zip file name (without extension)'
        required: false
        type: string
        default: 'converted_videos'
      upload_to:
        description: 'Upload destination'
        required: true
        type: choice
        default: 'artifacts'
        options:
          - 'artifacts'
          - 'release'

jobs:
  download-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Cache apt packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 ffmpeg bc
          
          # Install SVT-AV1 from official repository
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y libsvtav1enc-dev libsvtav1dec0
          
          # Install Python dependencies if requirements.txt exists
          if [ -f "scripts/requirements.txt" ]; then
            pip install -r scripts/requirements.txt
          fi
      
      - name: Run torrent download and conversion
        env:
          MAGNET_LINK: ${{ inputs.magnet_link }}
          QUALITY: ${{ inputs.quality }}
          ZIP_NAME: ${{ inputs.zip_name }}
          UPLOAD_TO: ${{ inputs.upload_to }}
        run: python scripts/torrent_download_convert.py
      
      - name: Upload to Artifacts
        if: ${{ inputs.upload_to == 'artifacts' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.zip_name }}
          path: ${{ inputs.zip_name }}.zip
          if-no-files-found: error
      
      - name: Upload to Movie1 Release
        if: ${{ inputs.upload_to == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Movie1
          files: ${{ inputs.zip_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
