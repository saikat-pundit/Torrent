name: External Video Download Link

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to download'
        required: true
        type: string
        default: 'Paste Your Link'
      output_filename:
        description: 'Output filename (without extension)'
        required: true
        type: string
        default: 'video'
      quality_original:
        description: 'Keep Original quality'
        required: false
        type: boolean
        default: true
      quality_480p:
        description: 'Convert to 480p'
        required: false
        type: boolean
        default: true
      quality_720p:
        description: 'Convert to 720p'
        required: false
        type: boolean
        default: true
      upload_to:
        description: 'Upload to Artifacts or Release'
        required: true
        type: choice
        options:
          - artifacts
          - release
        default: 'artifacts'

jobs:
  convert-video:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create scripts directory
      run: mkdir -p scripts
    
    - name: Create Python script
      run: |
        cat > scripts/download_and_convert.py << 'EOF'
        import os
        import sys
        import subprocess
        import requests
        
        def download_video(url, output_filename):
            print(f"Downloading video from: {url}")
            response = requests.get(url, stream=True, allow_redirects=True)
            
            if response.status_code == 200:
                with open(output_filename, 'wb') as f:
                    for chunk in response.iter_content(chunk_size=8192):
                        f.write(chunk)
                print(f"✓ Video downloaded as: {output_filename}")
                return True
            else:
                print(f"✗ Failed to download. Status code: {response.status_code}")
                return False
        
        def convert_video(input_file, output_file, resolution):
            print(f"Converting to {resolution}p...")
            cmd = [
                'ffmpeg',
                '-i', input_file,
                '-vf', f'scale=-2:{resolution}',
                '-c:v', 'libx264',
                '-preset', 'medium',
                '-crf', '23',
                '-c:a', 'aac',
                '-b:a', '128k',
                '-movflags', '+faststart',
                output_file,
                '-y'
            ]
            
            try:
                subprocess.run(cmd, check=True, capture_output=True, text=True)
                print(f"✓ Converted to {resolution}p: {output_file}")
                return True
            except subprocess.CalledProcessError as e:
                print(f"✗ Error converting to {resolution}p: {e.stderr}")
                return False
        
        def main():
            if len(sys.argv) < 2:
                print("Usage: python download_and_convert.py <video_url> [output_filename]")
                sys.exit(1)
            
            video_url = sys.argv[1]
            output_filename = sys.argv[2] if len(sys.argv) > 2 else 'downloaded_video.mp4'
            
            if not output_filename.endswith('.mp4'):
                output_filename += '.mp4'
            
            print("=" * 60)
            print("VIDEO DOWNLOAD AND CONVERTER")
            print("=" * 60)
            
            if not download_video(video_url, output_filename):
                sys.exit(1)
            
            # Check which qualities to convert based on environment variables
            quality_original = os.environ.get('QUALITY_ORIGINAL', 'true').lower() == 'true'
            quality_480p = os.environ.get('QUALITY_480P', 'true').lower() == 'true'
            quality_720p = os.environ.get('QUALITY_720P', 'true').lower() == 'true'
            
            if quality_original:
                # Rename original to match input filename
                base_name = output_filename.replace('.mp4', '')
                original_output = f"{base_name}_original.mp4"
                os.rename(output_filename, original_output)
                print(f"✓ Original saved as: {original_output}")
            
            if quality_480p:
                base_name = output_filename.replace('.mp4', '')
                output_480p = f"{base_name}_480p.mp4"
                convert_video(output_filename, output_480p, '480')
            
            if quality_720p:
                base_name = output_filename.replace('.mp4', '')
                output_720p = f"{base_name}_720p.mp4"
                convert_video(output_filename, output_720p, '720')
            
            print("=" * 60)
            print("✓ All conversions completed!")
            print("=" * 60)
        
        if __name__ == "__main__":
            main()
        EOF
    
    - name: Run video download and conversion
      env:
        QUALITY_ORIGINAL: ${{ github.event.inputs.quality_original }}
        QUALITY_480P: ${{ github.event.inputs.quality_480p }}
        QUALITY_720P: ${{ github.event.inputs.quality_720p }}
      run: |
        python scripts/download_and_convert.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.output_filename }}.mp4"
    
    - name: Upload to Artifacts
      if: ${{ github.event.inputs.upload_to == 'artifacts' }}
      run: |
        echo "Uploading to artifacts..."
    
    - name: Upload original video to artifacts
      if: ${{ github.event.inputs.quality_original == 'true' && github.event.inputs.upload_to == 'artifacts' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.output_filename }}-original
        path: ${{ github.event.inputs.output_filename }}_original.mp4
        retention-days: 7
    
    - name: Upload 480p video to artifacts
      if: ${{ github.event.inputs.quality_480p == 'true' && github.event.inputs.upload_to == 'artifacts' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.output_filename }}-480p
        path: ${{ github.event.inputs.output_filename }}_480p.mp4
        retention-days: 7
    
    - name: Upload 720p video to artifacts
      if: ${{ github.event.inputs.quality_720p == 'true' && github.event.inputs.upload_to == 'artifacts' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.output_filename }}-720p
        path: ${{ github.event.inputs.output_filename }}_720p.mp4
        retention-days: 7
    
    - name: Create Release
      if: ${{ github.event.inputs.upload_to == 'release' }}
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_number }}
        release_name: Release ${{ github.run_number }} - ${{ github.event.inputs.output_filename }}
        draft: false
        prerelease: false
    
    - name: Upload original video to release
      if: ${{ github.event.inputs.quality_original == 'true' && github.event.inputs.upload_to == 'release' }}
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.event.inputs.output_filename }}_original.mp4
        asset_name: ${{ github.event.inputs.output_filename }}_original.mp4
        asset_content_type: video/mp4
    
    - name: Upload 480p video to release
      if: ${{ github.event.inputs.quality_480p == 'true' && github.event.inputs.upload_to == 'release' }}
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.event.inputs.output_filename }}_480p.mp4
        asset_name: ${{ github.event.inputs.output_filename }}_480p.mp4
        asset_content_type: video/mp4
    
    - name: Upload 720p video to release
      if: ${{ github.event.inputs.quality_720p == 'true' && github.event.inputs.upload_to == 'release' }}
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.event.inputs.output_filename }}_720p.mp4
        asset_name: ${{ github.event.inputs.output_filename }}_720p.mp4
        asset_content_type: video/mp4
