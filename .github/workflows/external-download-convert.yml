name: External Video Download Link

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to download'
        required: true
        type: string
        default: 'Paste Your Link'
      output_filename:
        description: 'Output filename (without extension)'
        required: true
        type: string
        default: 'video'
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: 'original'
        options:
          - 'original'
          - '480p'
          - '720p'
      upload_to:
        description: 'Upload to'
        required: true
        type: choice
        default: 'artifacts'
        options:
          - 'artifacts'
          - 'release'

jobs:
  convert-video:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run video download and conversion
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
        OUTPUT_FILENAME: ${{ github.event.inputs.output_filename }}
        QUALITY: ${{ github.event.inputs.quality }}
      run: |
        python scripts/download_and_convert.py
    
    - name: Upload to Artifacts
      if: ${{ github.event.inputs.upload_to == 'artifacts' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.output_filename }}-${{ github.event.inputs.quality }}
        path: ${{ github.event.inputs.output_filename }}_${{ github.event.inputs.quality }}.mp4
        retention-days: 7
    
    - name: Create Release
      if: ${{ github.event.inputs.upload_to == 'release' }}
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_number }}
        release_name: Release ${{ github.run_number }} - ${{ github.event.inputs.output_filename }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      if: ${{ github.event.inputs.upload_to == 'release' }}
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.event.inputs.output_filename }}_${{ github.event.inputs.quality }}.mp4
        asset_name: ${{ github.event.inputs.output_filename }}_${{ github.event.inputs.quality }}.mp4
        asset_content_type: video/mp4
