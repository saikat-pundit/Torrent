name: External Video Download Link
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to download'
        required: true
        type: string
        default: 'Paste Your Link'
      output_filename:
        description: 'Output filename (without extension)'
        required: true
        type: string
        default: 'video'
      quality:
        description: 'Video Quality'
        required: true
        type: choice
        default: 'original'
        options:
          - 'original'
          - '480p'
          - '720p'
          - '480p-av1'
          - '720p-av1'
      upload_to:
        description: 'Upload to'
        required: true
        type: choice
        default: 'artifacts'
        options:
          - 'artifacts'
          - 'release'

jobs:
  convert-video:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Cache apt packages
      uses: actions/cache@v3
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache Python packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install FFmpeg and SVT-AV1
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
        # Install SVT-AV1 for AV1 encoding
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y libsvtav1enc-dev libsvtav1dec0
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
    
    - name: Run video download and conversion
      env:
        VIDEO_URL: ${{ github.event.inputs.video_url }}
        OUTPUT_FILENAME: ${{ github.event.inputs.output_filename }}
        QUALITY: ${{ github.event.inputs.quality }}
      run: |
        python scripts/download_and_convert.py
    
    - name: Upload to Artifacts
      if: ${{ github.event.inputs.upload_to == 'artifacts' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.output_filename }}-${{ github.event.inputs.quality }}
        path: ${{ github.event.inputs.output_filename }}_${{ github.event.inputs.quality }}.mp4
        if-no-files-found: error
    
    - name: Upload to Release
      if: ${{ github.event.inputs.upload_to == 'release' }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: Movie
        files: |
          ${{ github.event.inputs.output_filename }}_${{ github.event.inputs.quality }}.mp4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
