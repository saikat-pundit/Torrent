name: Download Torrent and Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      output_name:
        description: 'Output ZIP filename (without .zip)'
        required: true
        type: string
        default: 'downloaded_content'

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install aria2 and zip
        run: sudo apt-get update && sudo apt-get install -y aria2 zip

      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"

      - name: Zip downloaded files
        run: |
          cd ./download
          # Remove .torrent files
          rm -f *.torrent 2>/dev/null || true
          # Check if any files exist
          if [ -z "$(ls -A)" ]; then
            echo "ERROR: No files downloaded!"
            exit 1
          fi
          # Create zip
          zip -r "../${{ inputs.output_name }}.zip" .
          cd ..
          echo "Created ${{ inputs.output_name }}.zip ($(du -h ${{ inputs.output_name }}.zip | cut -f1))"

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "${{ inputs.output_name }}.zip"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          name: "${{ inputs.output_name }}.zip"
          overwrite: "true"
