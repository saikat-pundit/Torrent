name: Download Legitimate Torrent

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2
        
      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 "${{ inputs.magnet_link }}"
                 
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: |
            *.*
            !*.torrent
