name: Download Torrent and Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      output_name:
        description: 'Output ZIP filename (without .zip)'
        required: true
        type: string
        default: 'downloaded_content'

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install aria2 and zip
        run: sudo apt-get update && sudo apt-get install -y aria2 zip

      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"

      - name: Zip downloaded files
        run: |
          cd ./download
          rm -f *.torrent 2>/dev/null || true
          if [ -z "$(ls -A)" ]; then
            echo "ERROR: No files downloaded!"
            exit 1
          fi
          zip -r "../${{ inputs.output_name }}.zip" .
          cd ..
          echo "Created ${{ inputs.output_name }}.zip"

      - name: Upload to Google Drive
        uses: gaurav-nelson/gdrive-action@v1
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS_RAW }}
          file-path: "${{ inputs.output_name }}.zip"
          folder-id: ${{ secrets.GDRIVE_FOLDER_ID }}
          upload-name: "${{ inputs.output_name }}.zip"
          overwrite: true
