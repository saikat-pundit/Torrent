name: Download Torrent File

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      output_name:
        description: 'Output filename (with extension, e.g., file.zip)'
        required: false
        type: string
        default: 'downloaded_file'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2
        
      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"
                 
      - name: Rename downloaded file
        run: |
          cd ./download
          # Find the downloaded file (excluding .torrent files)
          DOWNLOADED_FILE=$(find . -maxdepth 1 -type f ! -name "*.torrent" | head -1)
          if [[ -n "$DOWNLOADED_FILE" && -n "${{ inputs.output_name }}" ]]; then
            mv "$DOWNLOADED_FILE" "${{ inputs.output_name }}"
            echo "Renamed to ${{ inputs.output_name }}"
          elif [[ -n "$DOWNLOADED_FILE" ]]; then
            echo "No rename specified, keeping original name: $DOWNLOADED_FILE"
          fi
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name || 'downloaded-files' }}
          path: |
            ./download/*
            !./download/*.torrent
