name: Download Torrent and Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      output_name:
        description: 'Output ZIP filename (without .zip)'
        required: true
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip

      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"

      - name: Zip downloaded files
        run: |
          cd ./download
          rm -f *.torrent 2>/dev/null || true
          zip -r "../${{ inputs.output_name }}.zip" .
          cd ..

      - name: Install gdrive
        run: |
          wget -O gdrive https://github.com/glotlabs/gdrive/releases/download/3.9.2/gdrive_linux-x64.tar.gz
          tar -xzf gdrive
          sudo mv gdrive /usr/local/bin/
          chmod +x /usr/local/bin/gdrive

      - name: Save service account key
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > service-account.json

      - name: Upload to Google Drive
        run: |
          /usr/local/bin/gdrive files upload \
            --service-account service-account.json \
            --parent "${{ secrets.GDRIVE_FOLDER_ID }}" \
            "${{ inputs.output_name }}.zip"
