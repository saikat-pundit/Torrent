name: Download Torrent and Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
        type: string
      output_name:
        description: 'Output filename (with extension)'
        required: false
        type: string
        default: 'downloaded_file'

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2
        
      - name: Download torrent
        run: |
          aria2c --seed-time=0 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 --dir=./download \
                 "${{ inputs.magnet_link }}"
                 
      - name: Rename downloaded file
        run: |
          cd ./download
          DOWNLOADED_FILE=$(find . -maxdepth 1 -type f ! -name "*.torrent" | head -1)
          if [[ -n "$DOWNLOADED_FILE" && -n "${{ inputs.output_name }}" ]]; then
            mv "$DOWNLOADED_FILE" "${{ inputs.output_name }}"
          fi
          
      - name: Upload to Google Drive
        uses: Jumbo810/Upload_Github_Artifacts_TO_GDrive@v2.3.3
        with:
          target: "./download/${{ inputs.output_name }}"
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          parent_folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
          name: ${{ inputs.output_name }}
          override: true
