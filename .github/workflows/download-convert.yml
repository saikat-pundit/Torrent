name: Download and Convert Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to download'
        required: true
        type: string
        default: 'Paste Your Link'
      output_filename:
        description: 'Output filename (without extension)'
        required: true
        type: string
        default: 'video'
      quality_480p:
        description: 'Convert to 480p'
        required: false
        type: boolean
        default: true
      quality_720p:
        description: 'Convert to 720p'
        required: false
        type: boolean
        default: true

jobs:
  convert-video:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create scripts directory
      run: mkdir -p scripts
    
    - name: Create Python script
      run: |
        cat > scripts/download_and_convert.py << 'EOF'
        import os
        import sys
        import subprocess
        import requests
        
        def download_video(url, output_filename):
            print(f"Downloading video from: {url}")
            response = requests.get(url, stream=True, allow_redirects=True)
            
            if response.status_code == 200:
                with open(output_filename, 'wb') as f:
                    for chunk in response.iter_content(chunk_size=8192):
                        f.write(chunk)
                print(f"✓ Video downloaded as: {output_filename}")
                return True
            else:
                print(f"✗ Failed to download. Status code: {response.status_code}")
                return False
        
        def convert_video(input_file, output_file, resolution):
            print(f"Converting to {resolution}p...")
            cmd = [
                'ffmpeg',
                '-i', input_file,
                '-vf', f'scale=-2:{resolution}',
                '-c:v', 'libx264',
                '-preset', 'medium',
                '-crf', '23',
                '-c:a', 'aac',
                '-b:a', '128k',
                '-movflags', '+faststart',
                output_file,
                '-y'
            ]
            
            try:
                subprocess.run(cmd, check=True, capture_output=True, text=True)
                print(f"✓ Converted to {resolution}p: {output_file}")
                return True
            except subprocess.CalledProcessError as e:
                print(f"✗ Error converting to {resolution}p: {e.stderr}")
                return False
        
        def main():
            if len(sys.argv) < 2:
                print("Usage: python download_and_convert.py <video_url> [output_filename]")
                sys.exit(1)
            
            video_url = sys.argv[1]
            output_filename = sys.argv[2] if len(sys.argv) > 2 else 'downloaded_video.mp4'
            
            if not output_filename.endswith('.mp4'):
                output_filename += '.mp4'
            
            print("=" * 60)
            print("VIDEO DOWNLOAD AND CONVERTER")
            print("=" * 60)
            
            if not download_video(video_url, output_filename):
                sys.exit(1)
            
            output_480p = f'video_480p_{output_filename}'
            convert_video(output_filename, output_480p, '480')
            
            output_720p = f'video_720p_{output_filename}'
            convert_video(output_filename, output_720p, '720')
            
            print("=" * 60)
            print("✓ All conversions completed!")
            print(f"  - Original: {output_filename}")
            print(f"  - 480p: {output_480p}")
            print(f"  - 720p: {output_720p}")
            print("=" * 60)
        
        if __name__ == "__main__":
            main()
        EOF
    
    - name: Run video download and conversion
      run: |
        python scripts/download_and_convert.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.output_filename }}.mp4"
    
    - name: Upload 480p video
      if: ${{ github.event.inputs.quality_480p == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: video-480p
        path: video_480p_${{ github.event.inputs.output_filename }}.mp4
        retention-days: 7
    
    - name: Upload 720p video
      if: ${{ github.event.inputs.quality_720p == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: video-720p
        path: video_720p_${{ github.event.inputs.output_filename }}.mp4
        retention-days: 7
    
    - name: Upload original video (optional)
      uses: actions/upload-artifact@v4
      with:
        name: original-video
        path: ${{ github.event.inputs.output_filename }}.mp4
        retention-days: 7
